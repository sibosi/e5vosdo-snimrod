version: "3.8"
services:
  app:
    image: ghcr.io/sibosi/e5vosdo-snimrod:latest
    ports:
      - "3000:3000"
    env_file:
      - .env
    restart: always
    deploy:
      mode: replicated
      replicas: 3

    watchtower:
      image: containrrr/watchtower
      volumes:
        - /var/run/docker.sock:/var/run/docker.sock
      restart: unless-stopped
      command: --cleanup --interval 300

  feed-refresh:
    image: alpine:3.20
    restart: unless-stopped
    depends_on:
      - app
    command:
      - sh
      - -c
      - |
        apk add --no-cache curl
        echo '*/15 * * * * curl --fail --silent --show-error -H "Accept: application/json" "http://app:3000/api/feed/instagram/refresh" >/dev/null 2>&1' > /etc/crontabs/root
        crond -f -l 8
